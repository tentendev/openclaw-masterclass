<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#4a1942"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E74C3C"/>
      <stop offset="100%" style="stop-color:#FF6B5B"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.05">
    <line x1="0" y1="0" x2="1200" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="200" y1="0" x2="1200" y2="500" stroke="#fff" stroke-width="1"/>
    <line x1="400" y1="0" x2="1200" y2="400" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="200" x2="1000" y2="630" stroke="#fff" stroke-width="1"/>
  </g>

  <!-- Accent line -->
  <rect x="100" y="180" width="80" height="4" rx="2" fill="url(#accent)"/>

  <!-- Title -->
  <text x="100" y="240" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="64" font-weight="700" fill="#FFFFFF" letter-spacing="-1">
    OpenClaw
  </text>
  <text x="100" y="310" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="64" font-weight="700" fill="#FF6B5B" letter-spacing="-1">
    MasterClass
  </text>

  <!-- Tagline -->
  <text x="100" y="370" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="24" fill="#8899aa" font-weight="400">
    The Most Comprehensive OpenClaw Learning Hub
  </text>

  <!-- Lobster emoji area -->
  <text x="100" y="440" font-size="48">&#x1F99E;</text>

  <!-- Molty the Lobster (large, on the right side) -->
  <g transform="translate(820, 120) scale(3.5)">
    <!-- Body -->
    <ellipse cx="32" cy="36" rx="10" ry="14" fill="#FF6B5B"/>
    <!-- Head -->
    <circle cx="32" cy="20" r="8" fill="#FF6B5B"/>
    <!-- Eyes -->
    <circle cx="29" cy="18" r="2" fill="#FFFFFF"/>
    <circle cx="35" cy="18" r="2" fill="#FFFFFF"/>
    <circle cx="29.5" cy="18" r="1" fill="#1a1a2e"/>
    <circle cx="35.5" cy="18" r="1" fill="#1a1a2e"/>
    <!-- Antennae -->
    <line x1="28" y1="13" x2="22" y2="5" stroke="#FF6B5B" stroke-width="2" stroke-linecap="round"/>
    <line x1="36" y1="13" x2="42" y2="5" stroke="#FF6B5B" stroke-width="2" stroke-linecap="round"/>
    <!-- Left Claw -->
    <path d="M22 30 Q14 24 10 28 Q7 31 10 34 Q13 37 16 33 L22 30Z" fill="#FF6B5B"/>
    <path d="M10 28 Q7 25 4 27 Q2 30 5 32 L10 34" fill="#FF8A7A"/>
    <!-- Right Claw -->
    <path d="M42 30 Q50 24 54 28 Q57 31 54 34 Q51 37 48 33 L42 30Z" fill="#FF6B5B"/>
    <path d="M54 28 Q57 25 60 27 Q62 30 59 32 L54 34" fill="#FF8A7A"/>
    <!-- Arms -->
    <path d="M24 32 L22 30" stroke="#FF8A7A" stroke-width="3" stroke-linecap="round"/>
    <path d="M40 32 L42 30" stroke="#FF8A7A" stroke-width="3" stroke-linecap="round"/>
    <!-- Tail -->
    <ellipse cx="32" cy="50" rx="8" ry="3" fill="#FF8A7A"/>
    <ellipse cx="32" cy="54" rx="6" ry="2.5" fill="#FF8A7A"/>
    <ellipse cx="32" cy="57" rx="4" ry="2" fill="#FF8A7A"/>
    <path d="M28 59 Q26 63 29 63 L32 60 L35 63 Q38 63 36 59 Z" fill="#FF6B5B"/>
    <!-- Body highlight -->
    <ellipse cx="32" cy="34" rx="5" ry="8" fill="#FF9E93" opacity="0.4"/>
    <!-- Smile -->
    <path d="M29 22 Q32 25 35 22" stroke="#FFFFFF" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="600" width="1200" height="30" fill="#E74C3C" opacity="0.8"/>
  <text x="600" y="622" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#FFFFFF" text-anchor="middle" font-weight="500">
    openclaw-masterclass  |  Community-driven learning resource
  </text>
</svg>